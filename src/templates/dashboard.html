<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Launcher</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #20252c;
      --muted: #697382;
      --line: #dce1e7;
      --accent: #0b6bcb;
      --good: #0f7b50;
      --bad: #b42318;
      --warn: #996400;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      background: #111827;
      color: #fff;
    }
    h1 { margin: 0; font-size: 19px; font-weight: 650; }
    h2 { margin: 0 0 12px; font-size: 15px; }
    main {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      padding: 16px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .stack { display: grid; gap: 16px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 5px 0; }
    .label { color: var(--muted); }
    .value { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; text-align: right; overflow-wrap: anywhere; }
    select, button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      min-height: 34px;
      padding: 0 10px;
      font: inherit;
    }
    select { width: 100%; }
    button { cursor: pointer; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.danger { color: var(--bad); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .status {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      background: #edf2f7;
      color: #3b4654;
    }
    .status.good { background: #e8f5ef; color: var(--good); }
    .status.bad { background: #fdecec; color: var(--bad); }
    .status.warn { background: #fff4d6; color: var(--warn); }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }
    th { color: var(--muted); font-weight: 600; }
    pre {
      margin: 8px 0 0;
      padding: 8px;
      max-height: 120px;
      overflow: auto;
      background: #f0f3f6;
      border-radius: 6px;
      font-size: 11px;
      white-space: pre-wrap;
    }
    .muted { color: var(--muted); }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Codex Launcher</h1>
    <div id="healthBadge" class="status">Checking</div>
  </header>
  <main>
    <div class="stack">
      <section>
        <h2>Proxy</h2>
        <div class="row"><span class="label">Profile</span><span id="profileName" class="value"></span></div>
        <div class="row"><span class="label">Local URL</span><span id="localUrl" class="value"></span></div>
        <div class="row"><span class="label">Upstream</span><span id="upstreamUrl" class="value"></span></div>
        <div class="row"><span class="label">OAuth</span><span id="oauthStatus" class="status"></span></div>
        <div class="row"><span class="label">SSL</span><span id="sslStatus" class="status"></span></div>
      </section>
      <section>
        <h2>Model</h2>
        <select id="modelSelect"></select>
        <div id="modelDetails" class="muted" style="margin-top:8px;"></div>
        <div class="actions">
          <button class="primary" id="selectModelButton">Use Selected Model</button>
        </div>
      </section>
      <section>
        <h2>Codex CLI</h2>
        <div class="row"><span class="label">Installed</span><span id="codexInstalled" class="status"></span></div>
        <div class="row"><span class="label">Running</span><span id="codexRunning" class="status"></span></div>
        <div class="row"><span class="label">Config</span><span id="codexConfig" class="value"></span></div>
        <div class="row"><span class="label">CLI</span><span id="codexCli" class="value"></span></div>
        <div class="row"><span class="label">Workspace</span><span id="codexWorkspace" class="value"></span></div>
        <div id="codexMessage" class="muted"></div>
        <div class="actions">
          <button id="configureButton">Configure</button>
          <button class="primary" id="launchButton">Launch CLI</button>
        </div>
      </section>
    </div>
    <section>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <h2>Recent Calls</h2>
        <button class="danger" id="clearCallsButton">Clear</button>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:88px;">Status</th>
            <th style="width:86px;">Duration</th>
            <th style="width:120px;">Endpoint</th>
            <th>Models</th>
            <th style="width:130px;">Tokens</th>
          </tr>
        </thead>
        <tbody id="callsBody"></tbody>
      </table>
    </section>
  </main>
  <script>
    const state = { models: [], selectedModel: null };
    const $ = (id) => document.getElementById(id);

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.detail || data.message || response.statusText);
      return data;
    }

    function badge(node, ok, text) {
      node.textContent = text;
      node.className = "status " + (ok === true ? "good" : ok === false ? "bad" : "warn");
    }

    async function loadConfig() {
      const health = await fetchJson("/health");
      badge($("healthBadge"), health.status === "ok", health.status);
      const config = await fetchJson("/api/config");
      $("profileName").textContent = config.profile;
      $("localUrl").textContent = config.localBaseUrl;
      $("upstreamUrl").textContent = config.upstreamBaseUrl;
      $("codexConfig").textContent = config.codex.configPath;
      $("codexCli").textContent = config.codex.cliPath;
      $("codexWorkspace").textContent = config.codex.workspacePath;
      badge($("oauthStatus"), config.oauthEnabled, config.oauthEnabled ? "enabled" : "disabled");
      badge($("sslStatus"), Boolean(config.sslProvider), config.sslProvider || "system");
    }

    async function loadModels() {
      const data = await fetchJson("/api/models");
      state.models = data.models;
      state.selectedModel = data.selectedModel;
      $("modelSelect").innerHTML = data.models.map((model) => {
        return `<option value="${model.id}" ${model.selected ? "selected" : ""}>${model.display_name}</option>`;
      }).join("");
      showModelDetails();
    }

    function showModelDetails() {
      const id = $("modelSelect").value;
      const model = state.models.find((item) => item.id === id);
      if (!model) return;
      $("modelDetails").textContent = `${model.id} -> ${model.upstream_model}; max_output_tokens=${model.max_output_tokens}`;
    }

    async function loadCodexStatus() {
      const status = await fetchJson("/api/codex/status");
      badge($("codexInstalled"), status.installed, status.installed ? "yes" : "missing");
      badge($("codexRunning"), status.running, status.running ? "running" : "stopped");
      $("codexCli").textContent = status.resolved_cli_path || status.cli_path || "";
      $("codexWorkspace").textContent = status.workspace_path || "";
      $("codexMessage").textContent = status.message || (status.installed ? "" : `Setup: ${status.setup_url}`);
    }

    async function loadCalls() {
      const data = await fetchJson("/api/calls?limit=100");
      $("callsBody").innerHTML = data.calls.map((call) => {
        const statusClass = call.status_code >= 500 ? "bad" : call.status_code >= 400 ? "warn" : "good";
        const tokens = [call.input_tokens, call.output_tokens, call.total_tokens].join(" / ");
        const details = call.error ? `<pre>${escapeHtml(call.error)}</pre>` : "";
        return `<tr>
          <td><span class="status ${statusClass}">${call.status_code}</span></td>
          <td>${call.duration_ms} ms</td>
          <td>${call.path}${call.streaming ? "<br><span class='muted'>stream</span>" : ""}</td>
          <td><span class="muted">Codex:</span> ${escapeHtml(call.original_model || "(unset)")}<br><span class="muted">Upstream:</span> ${escapeHtml(call.upstream_model || "")}${details}</td>
          <td>${tokens}</td>
        </tr>`;
      }).join("");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    $("modelSelect").addEventListener("change", showModelDetails);
    $("selectModelButton").addEventListener("click", async () => {
      await fetchJson("/api/models/select", { method: "POST", body: JSON.stringify({ model: $("modelSelect").value }) });
      await Promise.all([loadModels(), loadConfig()]);
    });
    $("configureButton").addEventListener("click", async () => {
      await fetchJson("/api/codex/configure", { method: "POST" });
      await loadCodexStatus();
    });
    $("launchButton").addEventListener("click", async () => {
      const result = await fetchJson("/api/codex/launch", { method: "POST" });
      if (!result.success && result.message) alert(result.message);
      await loadCodexStatus();
    });
    $("clearCallsButton").addEventListener("click", async () => {
      await fetchJson("/api/calls/clear", { method: "POST" });
      await loadCalls();
    });

    async function refresh() {
      try {
        await Promise.all([loadConfig(), loadModels(), loadCodexStatus(), loadCalls()]);
      } catch (error) {
        badge($("healthBadge"), false, error.message);
      }
    }

    refresh();
    setInterval(() => Promise.all([loadCodexStatus(), loadCalls()]).catch(() => {}), 3000);
  </script>
</body>
</html>
